apiVersion: 1
contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-receiver
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: "456104186"
          message: |
            🚨 *Antifraud Alert*

            {{ range .Alerts }}
            📛 *{{ .Labels.alertname }}*
            📊 {{ .Annotations.summary }}
            📈 {{ .Annotations.description }}
            🕐 {{ .StartsAt.Format "2006-01-02 15:04:05" }}
            {{ end }}
            🔗 https://antifraud-aadov.duckdns.org/d/antifraud-lab/antifraud-lab
          parse_mode: Markdown
        disableResolveMessage: false
